name: X KOL Daily

on:
  workflow_dispatch: {}
  schedule:
    # 23:30 Asia/Shanghai. GitHub cron uses UTC.
    - cron: "30 15 * * *"

concurrency:
  group: x-kol-daily
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      X_AUTH: ${{ secrets.X_AUTH }}
      X_CT0: ${{ secrets.X_CT0 }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore tweet cache
        uses: actions/cache@v5
        with:
          path: |
            cache
          key: x-kol-cache-${{ github.run_id }}
          restore-keys: |
            x-kol-cache-

      - name: Validate secrets
        shell: bash
        run: |
          missing=0
          for key in X_AUTH X_CT0 TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          exit "$missing"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run KOL watcher
        shell: bash
        run: |
          cmd=(python x_kol_daily.py --telegram-mode focus --send)
          echo "mode=focus send=true"
          printf 'command:'
          printf ' %q' "${cmd[@]}"
          printf '\n'

          set -o pipefail
          set +e
          "${cmd[@]}" 2>&1 | tee run.log
          status="${PIPESTATUS[0]}"
          set -e
          if [ "$status" != "0" ]; then
            {
              echo "### X KOL watcher failed"
              echo
              echo '```text'
              tail -n 200 run.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            tail -n 60 run.log | while IFS= read -r line; do
              line="${line//'%'/'%25'}"
              line="${line//$'\r'/'%0D'}"
              line="${line//$'\n'/'%0A'}"
              echo "::error title=X KOL watcher failed::$line"
            done
            exit "$status"
          fi
