name: X KOL Daily

on:
  workflow_dispatch:
    inputs:
      telegram_mode:
        description: "Telegram report mode"
        type: choice
        options:
          - focus
          - full
        default: focus
      send_telegram:
        description: "Send report to Telegram"
        type: boolean
        default: true
      max_kols:
        description: "Test only. 0 means all KOLs"
        type: number
        default: 0
  schedule:
    # 23:30 Asia/Shanghai. GitHub cron uses UTC.
    - cron: "30 15 * * *"

concurrency:
  group: x-kol-daily
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      X_AUTH: ${{ secrets.X_AUTH }}
      X_CT0: ${{ secrets.X_CT0 }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore tweet cache
        uses: actions/cache@v4
        with:
          path: |
            cache
          key: x-kol-cache-${{ github.run_id }}
          restore-keys: |
            x-kol-cache-

      - name: Validate secrets
        shell: bash
        run: |
          missing=0
          for key in X_AUTH X_CT0 TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          exit "$missing"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run KOL watcher
        shell: bash
        run: |
          mode="${{ github.event.inputs.telegram_mode }}"
          send="${{ github.event.inputs.send_telegram }}"
          max_kols="${{ github.event.inputs.max_kols }}"

          if [ -z "$mode" ]; then
            mode="focus"
          fi
          if [ -z "$send" ]; then
            send="true"
          fi
          if [ -z "$max_kols" ]; then
            max_kols="0"
          fi

          cmd=(python x_kol_daily.py --telegram-mode "$mode")
          if [ "$send" = "true" ]; then
            cmd+=(--send)
          else
            cmd+=(--no-send)
          fi
          if [ "$max_kols" != "0" ]; then
            cmd+=(--max-kols "$max_kols")
          fi

          "${cmd[@]}"
