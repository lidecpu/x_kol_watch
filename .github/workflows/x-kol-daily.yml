name: X KOL Daily

on:
  workflow_dispatch: {}

concurrency:
  group: x-kol-daily
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      X_AUTH: ${{ secrets.X_AUTH }}
      X_CT0: ${{ secrets.X_CT0 }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"
          cache: pip

      - name: Restore tweet cache
        uses: actions/cache@v6
        with:
          path: |
            cache
          key: x-kol-cache-${{ github.run_id }}
          restore-keys: |
            x-kol-cache-

      - name: Restore Playwright browser cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Validate secrets
        shell: bash
        run: |
          missing=0
          for key in X_AUTH X_CT0 TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          exit "$missing"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run KOL watcher
        shell: bash
        run: |
          cmd=(python x_kol_daily.py --telegram-mode full --telegram-chars 0 --send)
          echo "mode=full chars=full send=true"
          printf 'command:'
          printf ' %q' "${cmd[@]}"
          printf '\n'

          set -o pipefail
          set +e
          "${cmd[@]}" 2>&1 | tee run.log
          status="${PIPESTATUS[0]}"
          set -e
          if [ "$status" != "0" ]; then
            {
              echo "### X KOL watcher failed"
              echo
              echo '```text'
              tail -n 200 run.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            tail -n 60 run.log | while IFS= read -r line; do
              line="${line//'%'/'%25'}"
              line="${line//$'\r'/'%0D'}"
              line="${line//$'\n'/'%0A'}"
              echo "::error title=X KOL watcher failed::$line"
            done
            exit "$status"
          fi

          {
            echo "### X KOL watcher completed"
            echo
            scan_summary="$(grep -F '{"scan":' run.log | tail -n 1 || true)"
            if [ -n "$scan_summary" ]; then
              echo "#### Scan summary"
              echo
              echo '```json'
              echo "$scan_summary"
              echo '```'
              echo
            fi
            scan_errors="$(grep -F '[scan-error]' run.log || true)"
            if [ -n "$scan_errors" ]; then
              echo "#### Scan errors"
              echo
              echo '```text'
              echo "$scan_errors"
              echo '```'
              echo
            fi
            echo "#### Log tail"
            echo
            echo '```text'
            tail -n 40 run.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$scan_errors" ]; then
            scan_error_count="$(printf '%s\n' "$scan_errors" | grep -c .)"
            echo "::warning title=X KOL partial scan::$scan_error_count KOL scan(s) failed; see job summary"
          fi

      - name: Upload run diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: x-kol-run-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            run.log
            reports/*.md
            state/*.json
            cache/sent.json
